<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenkins Environment Dashboard</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #161822;
    --bg-card: #1c1f2e;
    --bg-card-hover: #232740;
    --border: #2a2e45;
    --text-primary: #e8eaf0;
    --text-secondary: #8b90a5;
    --text-muted: #5c6078;
    --accent: #6c7aff;
    --accent-glow: rgba(108, 122, 255, 0.15);
    --success: #34d399;
    --success-bg: rgba(52, 211, 153, 0.1);
    --failure: #f87171;
    --failure-bg: rgba(248, 113, 113, 0.1);
    --warning: #fbbf24;
    --warning-bg: rgba(251, 191, 36, 0.1);
    --running: #60a5fa;
    --running-bg: rgba(96, 165, 250, 0.1);
    --aborted: #9ca3af;
    --aborted-bg: rgba(156, 163, 175, 0.1);
    --unstable: #fb923c;
    --unstable-bg: rgba(251, 146, 60, 0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 0%, rgba(108,122,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(108,122,255,0.04) 0%, transparent 60%);
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15, 17, 23, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; color: #fff;
  }
  .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    background: var(--bg-card); border: 1px solid var(--border);
  }
  .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .btn {
    padding: 8px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-primary);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
  .btn-primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .btn-primary:hover { background: #5a68e6; }

  .btn svg { width: 14px; height: 14px; }

  main {
    position: relative; z-index: 1;
    max-width: 1440px; margin: 0 auto;
    padding: 24px 32px 48px;
  }

  .product-tabs {
    display: flex; gap: 4px; margin-bottom: 24px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px;
    width: fit-content;
  }
  .product-tab {
    padding: 8px 24px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    color: var(--text-secondary); border: none; background: transparent;
    transition: all 0.2s; font-family: inherit;
    display: flex; align-items: center; gap: 8px;
  }
  .product-tab:hover { color: var(--text-primary); }
  .product-tab.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .product-tab .tab-count {
    font-size: 11px; font-weight: 600;
    padding: 1px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.15);
  }
  .product-tab:not(.active) .tab-count {
    background: var(--bg-secondary); color: var(--text-muted);
  }

  .summary-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }

  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    transition: all 0.2s;
  }
  .summary-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .summary-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .summary-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .summary-value.success { color: var(--success); }
  .summary-value.failure { color: var(--failure); }
  .summary-value.running { color: var(--running); }
  .summary-value.total { color: var(--text-primary); }

  .env-group {
    margin-bottom: 32px;
  }
  .env-group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .env-group-title {
    font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
  }
  .env-group-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 12px; background: var(--accent-glow);
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px;
  }

  .env-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .env-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: all 0.25s;
    position: relative;
  }
  .env-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .env-card-stripe {
    height: 3px; width: 100%;
  }
  .env-card-stripe.SUCCESS { background: var(--success); }
  .env-card-stripe.FAILURE { background: var(--failure); }
  .env-card-stripe.RUNNING { background: var(--running); animation: stripe-pulse 1.5s ease-in-out infinite; }
  .env-card-stripe.ABORTED { background: var(--aborted); }
  .env-card-stripe.UNSTABLE { background: var(--unstable); }
  .env-card-stripe.UNKNOWN { background: var(--text-muted); }

  @keyframes stripe-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .env-card-body { padding: 20px; }

  .env-card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px;
  }

  .env-name {
    font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
    display: flex; align-items: center; gap: 8px;
  }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .status-badge.SUCCESS { background: var(--success-bg); color: var(--success); }
  .status-badge.FAILURE { background: var(--failure-bg); color: var(--failure); }
  .status-badge.RUNNING { background: var(--running-bg); color: var(--running); }
  .status-badge.ABORTED { background: var(--aborted-bg); color: var(--aborted); }
  .status-badge.UNSTABLE { background: var(--unstable-bg); color: var(--unstable); }
  .status-badge.UNKNOWN { background: var(--aborted-bg); color: var(--aborted); }

  .status-icon { width: 6px; height: 6px; border-radius: 50%; }
  .status-icon.SUCCESS { background: var(--success); }
  .status-icon.FAILURE { background: var(--failure); }
  .status-icon.RUNNING { background: var(--running); animation: pulse 1s ease-in-out infinite; }
  .status-icon.ABORTED { background: var(--aborted); }
  .status-icon.UNSTABLE { background: var(--unstable); }
  .status-icon.UNKNOWN { background: var(--aborted); }

  .env-details {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .detail-item { display: flex; flex-direction: column; gap: 4px; }
  .detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-value { font-size: 14px; font-weight: 500; color: var(--text-secondary); }

  .smoke-test-row {
    margin-top: 16px; padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .smoke-label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .smoke-label svg { width: 14px; height: 14px; opacity: 0.6; }
  .smoke-result {
    font-size: 12px; font-weight: 600; padding: 3px 10px;
    border-radius: 6px;
  }
  .smoke-result.pass { background: var(--success-bg); color: var(--success); }
  .smoke-result.fail { background: var(--failure-bg); color: var(--failure); }
  .smoke-result.skip { background: var(--aborted-bg); color: var(--aborted); }
  .smoke-result.running { background: var(--running-bg); color: var(--running); }

  .build-bar {
    margin-top: 12px;
    height: 4px; border-radius: 2px;
    background: var(--bg-secondary);
    overflow: hidden;
  }
  .build-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s ease;
  }
  .build-bar-fill.fast { background: var(--success); }
  .build-bar-fill.medium { background: var(--warning); }
  .build-bar-fill.slow { background: var(--failure); }

  .build-time-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted); margin-top: 4px;
  }

  .env-card-link {
    display: block; padding: 10px 20px;
    background: rgba(108, 122, 255, 0.04);
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--accent);
    text-decoration: none; text-align: center;
    transition: background 0.2s;
  }
  .env-card-link:hover { background: rgba(108, 122, 255, 0.1); }

  .last-updated {
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }

  .refresh-spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius-sm);
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-primary); }
  .empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto 20px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    padding: 12px 20px; border-radius: var(--radius-sm);
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); font-size: 13px;
    box-shadow: var(--shadow);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--failure); }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    main { padding: 16px; }
    .env-grid { grid-template-columns: 1fr; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
    .header-subtitle { display: none; }
  }
</style>
</head>
<body>

<div class="noise-overlay"></div>

<header>
  <div class="header-left">
    <div class="logo">J</div>
    <div>
      <div class="header-title">Jenkins Dashboard</div>
      <div class="header-subtitle">Environment Pipeline Monitor</div>
    </div>
  </div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated">
      <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      <span id="lastUpdatedText">Not yet updated</span>
    </div>
    <div class="status-pill" id="connectionStatus">
      <span class="dot"></span>
      <span id="connectionText">Disconnected</span>
    </div>
    <button class="btn" onclick="refreshAll()" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh
    </button>
    <button class="btn" onclick="toggleAutoRefresh()" id="autoRefreshBtn" title="Auto-refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      <span id="autoRefreshLabel">Auto: Off</span>
    </button>
  </div>
</header>

<main id="mainContent">
  <div class="product-tabs" id="productTabs"></div>
  <div class="summary-bar" id="summaryBar"></div>
  <div id="dashboardContent"></div>
</main>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
let envData = {};
let autoRefreshTimer = null;
let isAutoRefresh = false;
let activeProduct = localStorage.getItem('jenkins-dashboard-product') || 'aspen';

function init() {
  renderProductTabs();
  if (JENKINS_CONFIG.baseUrl) {
    refreshAll();
  } else {
    renderEmptyState();
  }
}

function renderProductTabs() {
  const container = document.getElementById('productTabs');
  container.innerHTML = PRODUCTS.map(p => {
    const configured = ENV_GROUPS.reduce((n, g) =>
      n + g.envs.filter(env => getPipeline(p.id, env.id)).length, 0);
    return `
      <button class="product-tab ${p.id === activeProduct ? 'active' : ''}" onclick="switchProduct('${p.id}')">
        ${p.name}
        <span class="tab-count">${configured}</span>
      </button>`;
  }).join('');
}

function switchProduct(productId) {
  activeProduct = productId;
  localStorage.setItem('jenkins-dashboard-product', productId);
  renderProductTabs();
  renderDashboard();
}

async function fetchBuildData(pipeline) {
  if (!pipeline) return null;

  const url = `${JENKINS_CONFIG.baseUrl}/${pipeline}/lastBuild/api/json?tree=number,result,duration,timestamp,building,displayName,actions[causes[shortDescription],failCount,totalCount,skipCount]`;

  const headers = {};
  if (JENKINS_CONFIG.apiToken) {
    headers['Authorization'] = 'Basic ' + btoa(JENKINS_CONFIG.apiToken);
  }

  try {
    const resp = await fetch(url, { headers, mode: 'cors' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    let smokeTest = null;
    if (data.actions) {
      const testAction = data.actions.find(a => a.totalCount !== undefined);
      if (testAction) {
        smokeTest = {
          total: testAction.totalCount,
          failed: testAction.failCount,
          skipped: testAction.skipCount,
          passed: testAction.totalCount - testAction.failCount - testAction.skipCount
        };
      }
    }

    return {
      number: data.number,
      result: data.building ? 'RUNNING' : (data.result || 'UNKNOWN'),
      duration: data.duration,
      timestamp: data.timestamp,
      building: data.building,
      smokeTest,
      pipeline
    };
  } catch (err) {
    return { error: err.message, pipeline };
  }
}

async function refreshAll() {
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('refresh-spin');

  const promises = [];
  PRODUCTS.forEach(p => ENV_GROUPS.forEach(g => g.envs.forEach(env => {
    const key = envKey(p.id, env.id);
    const pipeline = getPipeline(p.id, env.id);
    if (pipeline) {
      promises.push(
        fetchBuildData(pipeline).then(data => { envData[key] = data; })
      );
    }
  })));

  await Promise.allSettled(promises);

  icon.classList.remove('refresh-spin');
  renderDashboard();
  updateConnectionStatus();

  const now = new Date();
  document.getElementById('lastUpdatedText').textContent =
    `Updated ${now.toLocaleTimeString()}`;
}

function updateConnectionStatus() {
  const hasData = Object.values(envData).some(d => d && !d.error);
  const dot = document.querySelector('#connectionStatus .dot');
  const text = document.getElementById('connectionText');

  if (hasData) {
    dot.style.background = 'var(--success)';
    text.textContent = 'Connected';
  } else if (JENKINS_CONFIG.baseUrl) {
    dot.style.background = 'var(--failure)';
    text.textContent = 'Error';
  } else {
    dot.style.background = 'var(--text-muted)';
    text.textContent = 'Disconnected';
  }
}

function toggleAutoRefresh() {
  isAutoRefresh = !isAutoRefresh;
  const label = document.getElementById('autoRefreshLabel');
  if (isAutoRefresh) {
    label.textContent = `Auto: ${JENKINS_CONFIG.refreshInterval}s`;
    autoRefreshTimer = setInterval(refreshAll, JENKINS_CONFIG.refreshInterval * 1000);
    showToast(`Auto-refresh every ${JENKINS_CONFIG.refreshInterval}s`);
  } else {
    label.textContent = 'Auto: Off';
    clearInterval(autoRefreshTimer);
    showToast('Auto-refresh disabled');
  }
}

function formatDuration(ms) {
  if (!ms) return '—';
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return `${sec}s`;
  const min = Math.floor(sec / 60);
  const remSec = sec % 60;
  if (min < 60) return `${min}m ${remSec}s`;
  const hr = Math.floor(min / 60);
  const remMin = min % 60;
  return `${hr}h ${remMin}m`;
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'Just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const days = Math.floor(hr / 24);
  return `${days}d ago`;
}

function buildSpeedClass(ms) {
  if (!ms) return 'fast';
  const min = ms / 60000;
  if (min < 5) return 'fast';
  if (min < 15) return 'medium';
  return 'slow';
}

function buildSpeedPercent(ms) {
  if (!ms) return 0;
  const min = ms / 60000;
  return Math.min(100, (min / 30) * 100);
}

function renderDashboard() {
  const counts = { total: 0, success: 0, failure: 0, running: 0 };
  ENV_GROUPS.forEach(g => g.envs.forEach(env => {
    const d = envData[envKey(activeProduct, env.id)];
    if (!d || d.error) return;
    counts.total++;
    if (d.result === 'SUCCESS') counts.success++;
    else if (d.result === 'FAILURE') counts.failure++;
    else if (d.result === 'RUNNING') counts.running++;
  }));

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Total Pipelines</div>
      <div class="summary-value total">${counts.total}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Passing</div>
      <div class="summary-value success">${counts.success}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Failing</div>
      <div class="summary-value failure">${counts.failure}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">In Progress</div>
      <div class="summary-value running">${counts.running}</div>
    </div>
  `;

  document.getElementById('dashboardContent').innerHTML = ENV_GROUPS.map(group => `
    <div class="env-group">
      <div class="env-group-header">
        <div class="env-group-title">${group.name}</div>
        <span class="env-group-badge">${group.label}</span>
        <span style="font-size:12px; color:var(--text-muted); margin-left:auto;">${group.envs.length} environments</span>
      </div>
      <div class="env-grid">
        ${group.envs.map(env => renderEnvCard(env)).join('')}
      </div>
    </div>
  `).join('');
}

function renderEnvCard(env) {
  const key = envKey(activeProduct, env.id);
  const d = envData[key];
  const pipeline = d ? d.pipeline : getPipeline(activeProduct, env.id);

  if (!pipeline) {
    return `
      <div class="env-card" style="opacity: 0.5;">
        <div class="env-card-stripe UNKNOWN"></div>
        <div class="env-card-body">
          <div class="env-card-top">
            <div class="env-name">${env.name}</div>
            <span class="status-badge UNKNOWN"><span class="status-icon UNKNOWN"></span>No Pipeline</span>
          </div>
          <div style="font-size:13px; color:var(--text-muted);">
            Configure pipeline in Settings
          </div>
        </div>
      </div>`;
  }

  if (!d) {
    return `
      <div class="env-card">
        <div class="env-card-stripe UNKNOWN"></div>
        <div class="env-card-body">
          <div class="env-card-top">
            <div class="env-name">${env.name}</div>
            <span class="status-badge UNKNOWN"><span class="status-icon UNKNOWN"></span>Pending</span>
          </div>
          <div class="loading-skeleton" style="height:60px;"></div>
        </div>
      </div>`;
  }

  if (d.error) {
    return `
      <div class="env-card">
        <div class="env-card-stripe FAILURE"></div>
        <div class="env-card-body">
          <div class="env-card-top">
            <div class="env-name">${env.name}</div>
            <span class="status-badge FAILURE"><span class="status-icon FAILURE"></span>Error</span>
          </div>
          <div style="font-size:12px; color:var(--failure); word-break:break-all;">${d.error}</div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:6px;">${d.pipeline}</div>
        </div>
      </div>`;
  }

  const status = d.result;
  const smokeHtml = d.smokeTest ? `
    <div class="smoke-test-row">
      <span class="smoke-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        Smoke Tests
      </span>
      <span>
        <span class="smoke-result ${d.smokeTest.failed === 0 ? 'pass' : 'fail'}">
          ${d.smokeTest.passed}/${d.smokeTest.total} passed
        </span>
        ${d.smokeTest.skipped > 0 ? `<span class="smoke-result skip" style="margin-left:4px;">${d.smokeTest.skipped} skipped</span>` : ''}
      </span>
    </div>` : '';

  const buildLink = JENKINS_CONFIG.baseUrl && d.pipeline
    ? `<a class="env-card-link" href="${JENKINS_CONFIG.baseUrl}/${d.pipeline}/${d.number}/" target="_blank" rel="noopener">Open Build #${d.number} in Jenkins &rarr;</a>`
    : '';

  return `
    <div class="env-card">
      <div class="env-card-stripe ${status}"></div>
      <div class="env-card-body">
        <div class="env-card-top">
          <div class="env-name">${env.name}
            <span style="font-size:11px;color:var(--text-muted);font-weight:400;">#${d.number}</span>
          </div>
          <span class="status-badge ${status}"><span class="status-icon ${status}"></span>${status}</span>
        </div>
        <div class="env-details">
          <div class="detail-item">
            <span class="detail-label">Build Time</span>
            <span class="detail-value">${formatDuration(d.duration)}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Last Run</span>
            <span class="detail-value">${timeAgo(d.timestamp)}</span>
          </div>
        </div>
        <div class="build-bar">
          <div class="build-bar-fill ${buildSpeedClass(d.duration)}" style="width:${buildSpeedPercent(d.duration)}%"></div>
        </div>
        <div class="build-time-label">
          <span>0m</span><span>30m+</span>
        </div>
        ${smokeHtml}
      </div>
      ${buildLink}
    </div>`;
}

function renderEmptyState() {
  document.getElementById('summaryBar').innerHTML = '';
  document.getElementById('dashboardContent').innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      <h3>Welcome to Jenkins Dashboard</h3>
      <p>No pipelines configured yet. Edit <strong>config.js</strong> to set your Jenkins URL and pipeline paths.</p>
      <div style="margin-top:16px;">
        <button class="btn" onclick="loadDemoData()" style="display:inline-flex;">Preview with Demo Data</button>
      </div>
    </div>`;
}

function loadDemoData() {
  const statuses = ['SUCCESS', 'SUCCESS', 'SUCCESS', 'FAILURE', 'RUNNING', 'SUCCESS', 'UNSTABLE', 'ABORTED'];
  const durations = [120000, 240000, 360000, 480000, 180000, 900000, 60000, 1200000, 300000];

  PRODUCTS.forEach(p => ENV_GROUPS.forEach(g => g.envs.forEach(env => {
    const key = envKey(p.id, env.id);
    const status = statuses[Math.floor(Math.random() * statuses.length)];
    const dur = durations[Math.floor(Math.random() * durations.length)];
    const hasSmoke = Math.random() > 0.3;
    const total = Math.floor(Math.random() * 40) + 10;
    const failed = status === 'FAILURE' ? Math.floor(Math.random() * 5) + 1 : (Math.random() > 0.8 ? 1 : 0);
    const skipped = Math.floor(Math.random() * 3);

    envData[key] = {
      number: Math.floor(Math.random() * 500) + 100,
      result: status,
      duration: dur,
      timestamp: Date.now() - Math.floor(Math.random() * 7200000),
      building: status === 'RUNNING',
      smokeTest: hasSmoke ? { total, failed, skipped, passed: total - failed - skipped } : null,
      pipeline: `job/${p.id}/${env.id}-pipeline`
    };
  })));

  renderProductTabs();
  renderDashboard();
  updateConnectionStatus();
  document.getElementById('lastUpdatedText').textContent = 'Demo data loaded';
  document.querySelector('#connectionStatus .dot').style.background = 'var(--warning)';
  document.getElementById('connectionText').textContent = 'Demo Mode';
  showToast('Demo data loaded — configure real pipelines in config.js');
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
